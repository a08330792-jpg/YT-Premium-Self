name: Build iOS Tweak
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos environment
        uses: beerpiss/theos-action@v1

      - name: Build Tweak Package
        run: |
          make package FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTPremiumSelf-Package
          path: .theos/obj/*.dylib
